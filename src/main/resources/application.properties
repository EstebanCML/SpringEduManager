spring.application.name=SpringEduManager
server.port=8080

# Base de Datos MySQL (modifica host/puerto/nombre en un solo lugar)
app.database.host=localhost
app.database.port=3306
# Debe existir en MySQL y coincidir con lo que uses al cargar schema.sql (por defecto spring_edu_manager).
# Ejemplo otro nombre: biblioteca_untec_db (entonces crea esa BD y ajusta CREATE DATABASE/USE en schema.sql).
app.database.name=spring_edu_manager
spring.datasource.url=jdbc:mysql://${app.database.host}:${app.database.port}/${app.database.name}?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=EstebanCML
spring.datasource.password=Camilo1230.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# No ejecutar schema.sql / data.sql al arrancar: la BD la cargas y mantienes tú (Workbench).
# Asi tus datos de prueba no dependen de reinicios de la app.
spring.sql.init.mode=never

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Spring Security
spring.security.user.name=admin
spring.security.user.password=1234

# Dominio para correo institucional automatico de estudiantes (username@dominio)
app.estudiantes.email-domain=edu.cl

# Configuracion institucional de periodos para cursos
# Valores sugeridos: SEMESTRAL, TRIMESTRAL, CUATRIMESTRAL
app.periodos.sistema=SEMESTRAL
# Etiquetas mostradas al crear curso (cantidad acorde al sistema)
app.periodos.etiquetas=Primer semestre,Segundo semestre
