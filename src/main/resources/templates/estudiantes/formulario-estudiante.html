<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo estudiante</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
    <style>
        .form-estudiante {
            max-width: 640px;
            padding: 1rem;
        }
    </style>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-4">
        <section class="form-estudiante w-100">
            <h1 class="h4 mb-2 text-center">Registrar estudiante</h1>
            <p class="text-secondary small text-center">Se creará cuenta, rol ESTUDIANTE y código institucional automáticamente.</p>
            <div class="alert alert-info py-2 small">
                El <strong>usuario</strong>, <strong>correo institucional</strong> y <strong>código estudiante</strong> se generan automáticamente.
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <form th:action="@{/estudiantes}" th:object="${estudianteForm}" method="post" novalidate>
            <div class="row g-2">
                <div class="col-md-6">
                    <div class="form-floating">
                        <input id="nombre" class="form-control" placeholder="Nombre" th:classappend="${#fields.hasErrors('nombre')} ? ' is-invalid'" th:field="*{nombre}">
                        <label class="form-label" for="nombre">Nombre</label>
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating">
                        <input id="segundoNombre" class="form-control" placeholder="Segundo nombre" th:field="*{segundoNombre}">
                        <label class="form-label" for="segundoNombre">Segundo nombre</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating">
                        <input id="primerApellido" class="form-control" placeholder="Primer apellido" th:classappend="${#fields.hasErrors('primerApellido')} ? ' is-invalid'" th:field="*{primerApellido}">
                        <label class="form-label" for="primerApellido">Primer apellido</label>
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('primerApellido')}" th:errors="*{primerApellido}"></div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating">
                        <input id="segundoApellido" class="form-control" placeholder="Segundo apellido" th:classappend="${#fields.hasErrors('segundoApellido')} ? ' is-invalid'" th:field="*{segundoApellido}">
                        <label class="form-label" for="segundoApellido">Segundo apellido</label>
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('segundoApellido')}" th:errors="*{segundoApellido}"></div>
                </div>
                <div class="col-12">
                    <div class="form-floating">
                        <input id="password" type="password" class="form-control" placeholder="Contraseña" th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'" th:field="*{password}" autocomplete="new-password">
                        <label class="form-label" for="password">Contraseña</label>
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="col-12">
                    <div class="form-floating">
                        <input id="emailPersonal" type="email" class="form-control" placeholder="nombre@correo.com" th:classappend="${#fields.hasErrors('emailPersonal')} ? ' is-invalid'" th:field="*{emailPersonal}">
                        <label class="form-label" for="emailPersonal">Correo personal (opcional)</label>
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('emailPersonal')}" th:errors="*{emailPersonal}"></div>
                </div>
                <div class="col-12">
                    <label class="form-label small mb-1" for="sede">Sede</label>
                    <select id="sede" class="form-select" th:classappend="${#fields.hasErrors('sede')} ? ' is-invalid'" th:field="*{sede}">
                        <option value="">Seleccione...</option>
                        <option th:each="s : ${sedesDisponibles}" th:value="${s}" th:text="${s}">Sede</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('sede')}" th:errors="*{sede}"></div>
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-success w-100">Guardar estudiante</button>
            </div>
            <div class="text-center mt-3">
                <a class="link-secondary" th:href="@{/estudiantes}">← Volver al listado</a>
            </div>
            </form>
        </section>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
