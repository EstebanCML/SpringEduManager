<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudiantes</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container flex-grow-1 py-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <h1 class="h3 mb-0">Listado de estudiantes</h1>
            <a sec:authorize="hasRole('ADMIN')" class="btn btn-primary btn-sm" th:href="@{/estudiantes/nuevo}">Nuevo estudiante</a>
            <a sec:authorize="!hasRole('ADMIN')" class="btn btn-primary btn-sm disabled" href="#" aria-disabled="true" tabindex="-1">Nuevo estudiante</a>
        </div>
        <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
        <p class="text-secondary small">L3-2: también puedes dar de alta desde el formulario.</p>
        <div class="table-responsive">
            <table class="table table-striped table-sm align-middle">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Usuario</th>
                        <th>Correo</th>
                        <th>Sede</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="est : ${estudiantes}">
                        <td th:text="${est.codigoEstudiante}">—</td>
                        <td>
                            <span th:text="${est.usuario.nombre}">Nombre</span>
                            <span th:if="${est.usuario.segundoNombre != null}" th:text="' ' + ${est.usuario.segundoNombre}"></span>
                            <span th:text="' ' + ${est.usuario.primerApellido} + ' ' + ${est.usuario.segundoApellido}">Apellidos</span>
                        </td>
                        <td th:text="${est.usuario.username}">—</td>
                        <td th:text="${est.usuario.email}">—</td>
                        <td th:text="${est.sede}">—</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <p th:if="${#lists.isEmpty(estudiantes)}" class="text-warning">No hay filas en <code>estudiantes</code> (o la BD no está cargada).</p>
        <p class="mt-3"><a class="btn btn-outline-secondary btn-sm" th:href="@{/}">Volver al inicio</a></p>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
