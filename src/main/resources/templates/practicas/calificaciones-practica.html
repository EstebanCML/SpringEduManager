<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificaciones práctica</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container flex-grow-1 py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0" th:text="'Calificaciones: ' + ${practica.nombre}">Calificaciones</h1>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/practicas}">Volver</a>
    </div>
    <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>
    <table class="table table-striped table-sm align-middle">
        <thead>
        <tr>
            <th>Estudiante</th>
            <th>Estado</th>
            <th>Nota</th>
            <th>Comentario</th>
            <th>Guardar</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${calificaciones}">
            <td th:text="${c.inscripcion.estudiante.codigoEstudiante + ' - ' + c.inscripcion.estudiante.usuario.nombre + ' ' + c.inscripcion.estudiante.usuario.primerApellido}">Estudiante</td>
            <td colspan="4">
                <form class="row g-2" th:action="@{'/practicas/' + ${practica.id} + '/calificaciones/' + ${c.inscripcion.id}}" method="post">
                    <div class="col-md-3">
                        <select name="estado" class="form-select form-select-sm">
                            <option th:each="estado : ${estadosCalificacion}" th:selected="${estado == c.estado}" th:value="${estado}" th:text="${estado}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <input name="nota" type="number" step="0.01" class="form-control form-control-sm" th:value="${c.nota}">
                    </div>
                    <div class="col-md-5">
                        <input name="comentario" class="form-control form-control-sm" th:value="${c.comentario}">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary btn-sm w-100">Guardar</button>
                    </div>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
