<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prácticas</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container flex-grow-1 py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Prácticas</h1>
        <a class="btn btn-primary btn-sm" th:href="@{/practicas/nueva}">Nueva práctica</a>
    </div>
    <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>
    <table class="table table-striped table-sm align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Curso</th>
            <th>Nombre</th>
            <th>Entrega</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${practicas}">
            <td th:text="${p.id}">1</td>
            <td th:text="${p.curso.codigo + ' - ' + p.curso.nombre}">Curso</td>
            <td th:text="${p.nombre}">Práctica</td>
            <td th:text="${p.fechaEntrega}">2026-01-01</td>
            <td th:text="${p.estado}">ACTIVA</td>
            <td>
                <div class="d-flex flex-wrap gap-2">
                    <a class="btn btn-outline-light btn-sm" th:href="@{'/practicas/' + ${p.id} + '/editar'}">Editar</a>
                    <a class="btn btn-outline-info btn-sm" th:href="@{'/practicas/' + ${p.id} + '/calificaciones'}">Calificar</a>
                    <form th:action="@{'/practicas/' + ${p.id} + '/eliminar'}" method="post" class="m-0"
                          data-confirm-delete="true" data-confirm-message="¿Eliminar práctica?">
                        <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
