<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container flex-grow-1 py-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <h1 class="h3 mb-0">Listado de cursos</h1>
            <a sec:authorize="hasAnyRole('ADMIN','PROFESOR')" class="btn btn-primary btn-sm" th:href="@{/cursos/nuevo}">Nuevo curso</a>
        </div>
        <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>
        <p class="text-secondary small">Alta disponible desde <strong>Nuevo curso</strong>.</p>
        <div class="table-responsive">
            <table class="table table-striped table-sm align-middle">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Profesor</th>
                        <th>Sistema</th>
                        <th>Periodo</th>
                        <th>Inicio</th>
                        <th>Término</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${cursos}">
                        <td th:text="${c.codigo}">—</td>
                        <td th:text="${c.nombre}">—</td>
                        <td>
                            <span th:text="${c.profesor.usuario.nombre} + ' ' + ${c.profesor.usuario.primerApellido}">—</span>
                            <span class="text-secondary small" th:text="'(' + ${c.profesor.codigoProfesor} + ')'"></span>
                        </td>
                        <td th:text="${c.semestre.termSystem}">—</td>
                        <td th:text="${c.periodoAcademico}">—</td>
                        <td th:text="${c.fechaInicio}">—</td>
                        <td th:text="${c.fechaFin}">—</td>
                        <td th:text="${c.activo} ? 'Sí' : 'No'">—</td>
                        <td>
                            <a sec:authorize="hasRole('ADMIN')" class="btn btn-outline-light btn-sm" th:href="@{'/cursos/' + ${c.id} + '/editar'}">Editar</a>
                            <a sec:authorize="!hasRole('ADMIN')" class="btn btn-outline-light btn-sm disabled" href="#" aria-disabled="true" tabindex="-1">Editar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <p th:if="${#lists.isEmpty(cursos)}" class="text-warning">No hay cursos en la base de datos.</p>
        <p class="mt-3"><a class="btn btn-outline-secondary btn-sm" th:href="@{/}">Volver al inicio</a></p>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
