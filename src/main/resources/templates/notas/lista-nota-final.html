<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas finales</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container flex-grow-1 py-4">
    <h1 class="h3 mb-3">Notas finales</h1>
    <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
    <table class="table table-striped table-sm align-middle">
        <thead>
        <tr>
            <th>Estudiante</th>
            <th>Curso</th>
            <th>Año</th>
            <th>Periodo</th>
            <th>Prom. prácticas</th>
            <th>Prom. evaluaciones</th>
            <th>Examen final</th>
            <th>Nota final</th>
            <th>Fecha cierre</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="n : ${notasFinales}">
            <td th:text="${n.estudiante.codigoEstudiante + ' - ' + n.estudiante.usuario.nombre + ' ' + n.estudiante.usuario.primerApellido}">Estudiante</td>
            <td th:text="${n.curso.codigo + ' - ' + n.curso.nombre}">Curso</td>
            <td th:text="${n.academicYear}">2026</td>
            <td th:text="${n.termNumber}">1</td>
            <td th:text="${n.promedioPractica}">5.50</td>
            <td th:text="${n.promedioEvaluacion}">5.80</td>
            <td th:text="${n.notaExamenFinal}">6.00</td>
            <td th:text="${n.notaFinalSemestre}">5.75</td>
            <td th:text="${n.fechaCierre}">2026-07-15</td>
        </tr>
        </tbody>
    </table>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
