<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluaciones</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container flex-grow-1 py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Evaluaciones</h1>
        <a class="btn btn-primary btn-sm" th:href="@{/evaluaciones/nueva}">Nueva evaluación</a>
    </div>
    <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>
    <table class="table table-striped table-sm align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Curso</th>
            <th>Estudiante</th>
            <th>Tipo</th>
            <th>Nombre</th>
            <th>Fecha</th>
            <th>Nota</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="e : ${evaluaciones}">
            <td th:text="${e.id}">1</td>
            <td th:text="${e.curso.codigo + ' - ' + e.curso.nombre}">Curso</td>
            <td th:text="${e.inscripcion.estudiante.codigoEstudiante + ' - ' + e.inscripcion.estudiante.usuario.nombre + ' ' + e.inscripcion.estudiante.usuario.primerApellido}">Estudiante</td>
            <td th:text="${e.tipo}">TIPO</td>
            <td th:text="${e.nombre}">Nombre</td>
            <td th:text="${e.fechaEvaluacion}">2026-01-01</td>
            <td th:text="${e.nota}">6.00</td>
            <td>
                <div class="d-flex flex-wrap gap-2">
                    <a class="btn btn-outline-light btn-sm" th:href="@{'/evaluaciones/' + ${e.id} + '/editar'}">Editar</a>
                    <a class="btn btn-outline-info btn-sm" th:href="@{'/evaluaciones/' + ${e.id} + '/calificar'}">Calificar</a>
                    <form th:action="@{'/evaluaciones/' + ${e.id} + '/eliminar'}" method="post" class="m-0"
                          data-confirm-delete="true" data-confirm-message="¿Eliminar evaluación?">
                        <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
