<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificar evaluación</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container flex-grow-1 py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h4 mb-1" th:text="'Calificar: ' + ${evaluacionRef.nombre}">Calificar</h1>
            <p class="text-secondary small mb-0"
               th:text="${evaluacionRef.curso.codigo + ' — ' + evaluacionRef.curso.nombre + ' · ' + evaluacionRef.tipo + ' · ' + evaluacionRef.fechaEvaluacion}">
                Contexto
            </p>
        </div>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/evaluaciones}">Volver</a>
    </div>
    <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>
    <table class="table table-striped table-sm align-middle">
        <thead>
        <tr>
            <th>Estudiante</th>
            <th>Nota</th>
            <th>Comentario</th>
            <th>Guardar</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="f : ${filas}">
            <td th:text="${f.inscripcion.estudiante.codigoEstudiante + ' - ' + f.inscripcion.estudiante.usuario.nombre + ' ' + f.inscripcion.estudiante.usuario.primerApellido}">Estudiante</td>
            <td colspan="3">
                <form class="row g-2" th:action="@{'/evaluaciones/' + ${evaluacionRef.id} + '/calificaciones/' + ${f.inscripcion.id}}" method="post">
                    <div class="col-md-2">
                        <input name="nota" type="number" step="0.01" min="0" max="7" required class="form-control form-control-sm"
                               th:value="${f.evaluacion != null ? f.evaluacion.nota : ''}">
                    </div>
                    <div class="col-md-7">
                        <input name="comentario" class="form-control form-control-sm" th:value="${f.evaluacion != null ? f.evaluacion.comentario : ''}">
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary btn-sm w-100">Guardar</button>
                    </div>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
