<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripciones</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container flex-grow-1 py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Inscripciones</h1>
        <a sec:authorize="hasRole('ADMIN')" class="btn btn-primary btn-sm" th:href="@{/inscripciones/nueva}">Nueva inscripción</a>
    </div>
    <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>
    <div class="alert alert-warning py-2 small">
        El botón <strong>Resumen</strong> en la tabla es solo para revisión técnica de cálculo/API durante desarrollo.
        No está pensado como acción visible en la versión final de usuario.
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-sm align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Estudiante</th>
                <th>Curso</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="i : ${inscripciones}">
                <td th:text="${i.id}">1</td>
                <td th:text="${i.estudiante.codigoEstudiante + ' - ' + i.estudiante.usuario.nombre + ' ' + i.estudiante.usuario.primerApellido}">Estudiante</td>
                <td th:text="${i.curso.codigo + ' - ' + i.curso.nombre}">Curso</td>
                <td th:text="${i.fechaInscripcion}">2026-01-01</td>
                <td th:text="${i.estado}">ACTIVA</td>
                <td>
                    <div class="d-flex flex-wrap gap-2">
                    <a class="btn btn-outline-info btn-sm" th:href="@{'/notas-finales/inscripcion/' + ${i.id}}" title="Uso interno para revisar cálculo/API">Resumen</a>
                    <a sec:authorize="hasRole('ADMIN')" class="btn btn-outline-light btn-sm" th:href="@{'/inscripciones/' + ${i.id} + '/editar'}">Editar</a>
                    <form sec:authorize="hasRole('ADMIN')" th:action="@{'/inscripciones/' + ${i.id} + '/eliminar'}"
                          method="post" class="m-0" data-confirm-delete="true" data-confirm-message="¿Eliminar inscripción?">
                        <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                    </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
