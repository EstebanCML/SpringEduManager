<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container flex-grow-1 py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 mb-0">Gestión de usuarios</h1>
            <a class="btn btn-primary btn-sm" th:href="@{/usuarios/nuevo}">Nuevo usuario</a>
        </div>
        <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>
        <div class="table-responsive">
            <table class="table table-striped table-sm align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Nombre</th>
                    <th>Correo institucional</th>
                    <th>Rol principal</th>
                    <th>Activo</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.id}">1</td>
                    <td th:text="${u.username}">usuario</td>
                    <td th:text="${u.nombre} + ' ' + ${u.primerApellido}">Nombre</td>
                    <td th:text="${u.email}">correo</td>
                    <td th:text="${rolesPrincipales[u.id] != null ? rolesPrincipales[u.id] : 'SIN_ROL'}">ROL</td>
                    <td th:text="${u.activo} ? 'Sí' : 'No'">Sí</td>
                    <td>
                        <a class="btn btn-outline-light btn-sm" th:href="@{'/usuarios/' + ${u.id} + '/editar'}">Editar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
