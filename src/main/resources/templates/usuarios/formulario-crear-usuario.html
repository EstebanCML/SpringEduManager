<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear usuario</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
    <style>
        .form-crear-usuario {
            max-width: 560px;
            padding: 1rem;
        }
        .form-crear-usuario .form-floating:focus-within {
            z-index: 2;
        }
    </style>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container flex-grow-1 d-flex align-items-center justify-content-center py-4">
    <section class="form-crear-usuario w-100">
        <h1 class="h4 mb-3 text-center">Crear usuario</h1>
        <p class="text-body-secondary text-center mb-3">Alta administrativa de cuentas internas del sistema.</p>
        <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>
        <div class="alert alert-info py-2 mb-3">
            El <strong>username</strong> y el correo institucional se generan automáticamente
            con la lógica del sistema según nombre y apellidos.
        </div>

        <form th:action="@{/usuarios}" th:object="${usuarioCreateForm}" method="post" novalidate>
            <div class="row g-2">
                <div class="col-md-6">
                    <div class="form-floating">
                        <input id="nombre" class="form-control" th:field="*{nombre}" placeholder="Nombre">
                        <label for="nombre">Nombre</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating">
                        <input id="segundoNombre" class="form-control" th:field="*{segundoNombre}" placeholder="Segundo nombre">
                        <label for="segundoNombre">Segundo nombre</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating">
                        <input id="primerApellido" class="form-control" th:field="*{primerApellido}" placeholder="Primer apellido">
                        <label for="primerApellido">Primer apellido</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating">
                        <input id="segundoApellido" class="form-control" th:field="*{segundoApellido}" placeholder="Segundo apellido">
                        <label for="segundoApellido">Segundo apellido</label>
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-floating">
                        <input id="emailPersonal" type="email" class="form-control" th:field="*{emailPersonal}" placeholder="correo@personal.com">
                        <label for="emailPersonal">Correo personal (opcional)</label>
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-floating">
                        <input id="password" type="password" class="form-control" th:field="*{password}" placeholder="Contraseña">
                        <label for="password">Contraseña</label>
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-floating">
                        <select id="rol" class="form-select" th:field="*{rol}">
                            <option value="" disabled selected>Seleccionar</option>
                            <option th:each="r : ${rolesDisponibles}" th:value="${r}" th:text="${r}"></option>
                        </select>
                        <label for="rol">Rol</label>
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-check mt-1">
                        <input id="activo" class="form-check-input" type="checkbox" th:field="*{activo}">
                        <label class="form-check-label" for="activo">Usuario activo</label>
                    </div>
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-success w-100">Crear usuario</button>
            </div>
            <div class="text-center mt-3">
                <a class="link-secondary" th:href="@{/usuarios}">← Volver al listado</a>
            </div>
        </form>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
