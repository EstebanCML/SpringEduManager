<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar usuario</title>
    <th:block th:replace="~{fragments/common-assets :: styles}"></th:block>
</head>
<body data-bs-theme="dark" class="d-flex flex-column min-vh-100 layout-navbar-offset">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container flex-grow-1 py-4 col-lg-8">
    <h1 class="h4 mb-3">Editar usuario</h1>
    <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>
    <form th:action="@{'/usuarios/' + ${usuario.id}}" th:object="${usuarioForm}" method="post" novalidate>
        <div class="row g-2">
            <div class="col-md-6">
                <label class="form-label">Usuario</label>
                <input class="form-control form-control-sm" th:value="${usuario.username}" disabled>
            </div>
            <div class="col-md-6">
                <label class="form-label">Correo institucional</label>
                <input class="form-control form-control-sm" th:value="${usuario.email}" disabled>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="nombre">Nombre</label>
                <input id="nombre" class="form-control form-control-sm" th:field="*{nombre}">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="segundoNombre">Segundo nombre</label>
                <input id="segundoNombre" class="form-control form-control-sm" th:field="*{segundoNombre}">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="primerApellido">Primer apellido</label>
                <input id="primerApellido" class="form-control form-control-sm" th:field="*{primerApellido}">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="segundoApellido">Segundo apellido</label>
                <input id="segundoApellido" class="form-control form-control-sm" th:field="*{segundoApellido}">
            </div>
            <div class="col-md-8">
                <label class="form-label" for="emailPersonal">Correo personal</label>
                <input id="emailPersonal" type="email" class="form-control form-control-sm" th:field="*{emailPersonal}">
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <div class="form-check mb-2">
                    <input id="activo" class="form-check-input" type="checkbox" th:field="*{activo}">
                    <label class="form-check-label" for="activo">Usuario activo</label>
                </div>
            </div>
        </div>
        <div class="mt-3 d-flex gap-2">
            <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/usuarios}">Volver</a>
        </div>
    </form>
    <div class="mt-2 d-flex justify-content-end">
        <form th:action="@{'/usuarios/' + ${usuario.id} + '/eliminar'}" method="post"
              data-confirm-delete="true" data-confirm-message="¿Seguro que quieres borrar este usuario?">
            <button type="submit" class="btn btn-sm btn-danger">Borrar usuario</button>
        </form>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/common-assets :: scripts}"></th:block>
</body>
</html>
