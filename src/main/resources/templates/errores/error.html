<!DOCTYPE html>
<!--
  Vista de error HTTP (404, 405, 500, etc.). Resuelta vía ErroresErrorViewResolver -> "errores/error".
-->
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{errores/layout-app :: layout ('Error', ~{:: mainError})}">
<head><meta charset="UTF-8"></head>
<body>
<main th:fragment="mainError" class="container flex-grow-1 d-flex align-items-center justify-content-center py-4">
    <section class="text-center col-lg-7">
        <h1 class="display-6 fw-bold mb-2">Ups, ocurrió un problema</h1>
        <p class="text-secondary mb-4">
            No se pudo completar la solicitud.
        </p>

        <div class="card bg-dark border-secondary text-start mb-4">
            <div class="card-body">
                <p class="mb-2"><strong>Estado:</strong> <span th:text="${status} ?: 'N/D'">404</span></p>
                <p class="mb-2"><strong>Error:</strong> <span th:text="${error} ?: 'Error no controlado'">Not Found</span></p>
                <p class="mb-0"><strong>Detalle:</strong> <span th:text="${message} ?: 'La ruta solicitada no existe o no está disponible.'">Detalle</span></p>
            </div>
        </div>

        <div class="d-flex justify-content-center gap-2">
            <a class="btn btn-primary" th:href="@{/home}">Ir al panel</a>
            <a class="btn btn-outline-secondary" th:href="@{/}">Volver al inicio</a>
        </div>
    </section>
</main>
</body>
</html>
