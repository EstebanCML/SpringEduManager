<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Recursos comunes (misma base que index.html).
  <head>:   th:replace="~{fragments/common-assets :: styles}"
  </body>: th:replace="~{fragments/common-assets :: scripts}" (antes del cierre de body)

  CSS/JS solo de una vista: añádelos en esa plantilla — tras ::styles en <head> (link extra)
  o tras ::scripts (script extra), para no cargarlos en el resto de páginas.
-->
<th:block th:fragment="styles">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/styles.css">
</th:block>
<th:block th:fragment="scripts">
    <script src="/js/scripts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</th:block>
</html>
