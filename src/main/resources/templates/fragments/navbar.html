<!-- fragments/navbar.html -->
<div th:fragment="navbar" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Spring Edu Manager</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
          <ul class="navbar-nav me-auto mb-2 mb-md-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a sec:authorize="hasAnyRole('ADMIN','PROFESOR','AYUDANTE')" class="nav-link" th:href="@{/estudiantes}">Estudiantes</a>
            </li>
            <li class="nav-item">
              <a sec:authorize="hasRole('ADMIN')" class="nav-link" th:href="@{/usuarios}">Usuarios</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/cursos}">Cursos</a>
            </li>
            <li class="nav-item">
              <a sec:authorize="hasAnyRole('ADMIN','PROFESOR','AYUDANTE')" class="nav-link" th:href="@{/inscripciones}">Inscripciones</a>
            </li>
            <li class="nav-item">
              <a sec:authorize="hasAnyRole('ADMIN','PROFESOR','AYUDANTE')" class="nav-link" th:href="@{/practicas}">Prácticas</a>
            </li>
            <li class="nav-item">
              <a sec:authorize="hasAnyRole('ADMIN','PROFESOR','AYUDANTE')" class="nav-link" th:href="@{/evaluaciones}">Evaluaciones</a>
            </li>
            <li class="nav-item">
              <a sec:authorize="hasAnyRole('ADMIN','PROFESOR','AYUDANTE')" class="nav-link" th:href="@{/notas-finales}">Notas finales</a>
            </li>
            <li class="nav-item">
              <a sec:authorize="hasRole('ADMIN')" class="nav-link" th:href="@{/ponderaciones}">Ponderaciones</a>
            </li>
            <li class="nav-item">
              <a sec:authorize="isAuthenticated()" class="nav-link" th:href="@{/mis-notas}">Mis notas</a>
            </li>
            <li class="nav-item">
              <a sec:authorize="hasRole('ESTUDIANTE')" class="nav-link" th:href="@{/mis-eventos-notas}">Mis eventos y notas</a>
            </li>
            
          </ul>

          <!-- Bloque final tipo JSP: Bienvenido + Mi Perfil + Logout / si no hay sesión: Login -->
          <div class="ms-auto d-flex align-items-center">
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
              <span class="navbar-text text-light small">
                Bienvenido,
                <span sec:authentication="name"></span>!
              </span>
              <a class="btn btn-outline-secondary btn-sm" th:href="@{/perfil}">Mi Perfil</a>
              <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
              </form>
            </div>
            <a sec:authorize="isAnonymous()" class="btn btn-outline-success btn-sm" th:href="@{/login}">Login</a>
          </div>
        </div>
      </div>
    </nav>
</div>
